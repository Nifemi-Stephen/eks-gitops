name: CI-pipelines

on:
  push:
    branches:
      - main
    paths:
      - "app-and-dockerfile/Dockerfile"
      - "app-and-dockerfile/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKER_USERNAME }}" #docker login username stored in github secret
          password: "${{ secrets.DOCKER_PASSWORD }}" #docker login password stored in github secret

      - name: Build image
        run: |
          docker build -t dockerhubname/imagename:${{ github.sha }} ./app-and-dockerfile

      - name: Push image
        run: |
          docker push dockerhubname/imagename:${{ github.sha }}

      - name: update helm values.yaml image tag
        run: |
          sed -i 's/tag:.*/tag: "${{ github.sha }}"/' helm/values.yaml

      - name: commit Updated values.yaml
        run: |
          git config --global user.email "your email"
          git config --global user.name "your username"

          git add helm/values.yaml

          git commit -m "Update iamge tag to ${{ github.sha }}" || echo "No changes to commit"

          git push
